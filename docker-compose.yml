services:
  audit-server:
    build: .
    ports:
      # Bind to loopback only — public access goes through ag402-gateway.
      # Exposing 8000 publicly would bypass the payment wall.
      - "127.0.0.1:8000:8000"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8000/health'); assert r.status_code==200"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  ag402-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    environment:
      - AG402_TARGET_URL=http://audit-server:8000
    ports:
      - "8001:8001"
    env_file: .env
    volumes:
      - ag402-data:/home/appuser/.ag402
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8001/health'); assert r.status_code==200"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      audit-server:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  ag402-data:
