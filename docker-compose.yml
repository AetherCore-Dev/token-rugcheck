services:
  audit-server:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8000/health'); assert r.status_code==200"]
      interval: 30s
      timeout: 5s
      retries: 3

  ag402-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    environment:
      - AG402_TARGET_URL=http://audit-server:8000
    ports:
      - "8001:8001"
    env_file: .env
    volumes:
      - ag402-data:/home/appuser/.ag402
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8001/health'); assert r.status_code==200"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      audit-server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ag402-data:
